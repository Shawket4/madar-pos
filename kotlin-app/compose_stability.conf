// Compose stability configuration.
//
// The UniFFI-generated view/record classes (app.madar.core.*) are `data class`es
// with `var` fields, so the Compose compiler infers them as UNSTABLE. In practice
// they are immutable value snapshots: the UI never mutates a field — every list and
// object is rebuilt wholesale from the Rust core on each refresh. Treating them as
// stable lets Compose skip recomposing cards/rows whose data is unchanged (e.g. a
// menu of N items no longer re-lays-out every card on an unrelated state change).
app.madar.core.*
