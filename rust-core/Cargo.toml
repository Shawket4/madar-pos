# Sufrix POS shared core — Cargo workspace.
#
# `sufrix-core` is the UniFFI library the Swift + Kotlin apps link against.
# `sufrix-api` (the openapi-generator output) is generated by tool/generate_api.sh
# and is excluded from the workspace until Phase 2 wires it into sufrix-core, so
# the Phase-1 foundation builds without depending on codegen succeeding.
[workspace]
resolver = "2"
members = ["crates/sufrix-core"]
exclude = ["crates/sufrix-api"]

[workspace.package]
edition = "2021"
version = "0.1.0"
license = "UNLICENSED"
publish = false

[profile.release]
# Smaller, faster native libs for the mobile/desktop artifacts.
lto = true
codegen-units = 1
strip = "debuginfo"
