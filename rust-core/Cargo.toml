# Madar POS shared core — Cargo workspace.
#
# `madar-core` is the UniFFI library the Swift + Kotlin apps link against.
# `madar-api` (the openapi-generator output) is generated by tool/generate_api.sh
# and wired into madar-core as of Phase 2 (the typed reqwest client the `net/`
# layer drives). Regenerate with tool/generate_api.sh when the backend spec moves.
[workspace]
resolver = "2"
members = ["crates/madar-core", "crates/madar-api"]

[workspace.package]
edition = "2021"
version = "0.1.0"
license = "UNLICENSED"
publish = false

[profile.release]
# Smaller, faster native libs for the mobile/desktop artifacts.
lto = true
codegen-units = 1
strip = "debuginfo"
