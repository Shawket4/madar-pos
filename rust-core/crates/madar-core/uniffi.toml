# UniFFI binding generation config (used by the uniffi-bindgen bin).
[bindings.swift]
module_name = "MadarCoreFFI"
# Generates a single .swift + a modulemap; the xcframework wraps the staticlib.

[bindings.kotlin]
package_name = "app.madar.core"
# JNA-based; the same bindings load on Android and on desktop (Compose JVM).
