# Pin the toolchain + the cross-compile targets every platform artifact needs,
# so `rustup` provisions them on checkout. iOS (device + sim), Android (arm64,
# armv7, x86_64), and desktop (macOS + Linux).
[toolchain]
channel = "1.90.0"
components = ["rustfmt", "clippy"]
targets = [
  "aarch64-apple-ios",
  "aarch64-apple-ios-sim",
  "x86_64-apple-ios",
  "aarch64-apple-darwin",
  "aarch64-linux-android",
  "armv7-linux-androideabi",
  "x86_64-linux-android",
  "x86_64-unknown-linux-gnu",
]
