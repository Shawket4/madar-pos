# xcodegen spec for the Sufrix POS apps (macOS + iOS). Regenerate with:
#   cd swift-app && xcodegen generate
# then open SufrixPOS.xcworkspace and pick a scheme (SufrixPOS = macOS,
# SufrixPOS-iOS = iPhone/iPad). Pre-build phases regenerate the Rust bindings
# and build the core (dylib for macOS, xcframework for iOS), so ⌘R just works.
name: SufrixPOS
options:
  bundleIdPrefix: app.sufrix
  deploymentTarget:
    macOS: "13.0"
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO

targets:
  # ── macOS app (links the cargo dylib; FFI module map via SWIFT_INCLUDE_PATHS) ──
  SufrixPOS:
    type: application
    platform: macOS
    sources:
      - path: Sources/SufrixUI
      - path: ../rust-core/bindings/swift/SufrixCoreFFI.swift
        group: Generated
      - path: Resources/Assets.xcassets
      - path: Resources/Fonts
        type: folder
    info:
      path: Generated/Info-macOS.plist
      properties:
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        # Dev: allow plaintext HTTP so a self-hosted / localhost backend works.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.sufrix.pos
        PRODUCT_NAME: Sufrix POS
        SWIFT_INCLUDE_PATHS: $(SRCROOT)/Generated
        LIBRARY_SEARCH_PATHS: $(SRCROOT)/../rust-core/target/debug
        OTHER_LDFLAGS: -lsufrix_core
        LD_RUNPATH_SEARCH_PATHS: $(SRCROOT)/../rust-core/target/debug
    preBuildScripts:
      - name: Generate Rust bindings + core
        basedOnDependencyAnalysis: false
        script: |
          set -e
          RUST="$SRCROOT/../rust-core"
          # Run cargo in a CLEAN env — Xcode injects SDKROOT/ICONV/etc. that break
          # the HOST cargo build (links against the app SDK → "iconv not found").
          # A clean env lets cargo resolve the right SDK per-target via xcrun.
          P="$HOME/.cargo/bin:/opt/homebrew/bin:/usr/bin:/bin:/usr/sbin:/sbin"
          env -i HOME="$HOME" PATH="$P" bash "$RUST/tool/build-bindings.sh" >/dev/null
          mkdir -p "$SRCROOT/Generated"
          cp "$RUST/bindings/swift/SufrixCoreFFIFFI.h" "$SRCROOT/Generated/"
          cp "$RUST/bindings/swift/SufrixCoreFFIFFI.modulemap" "$SRCROOT/Generated/module.modulemap"

  # ── iOS app (iPhone + iPad; links SufrixCore.xcframework from build-ios.sh) ──
  SufrixPOS-iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/SufrixUI
      - path: ../rust-core/bindings/swift/SufrixCoreFFI.swift
        group: Generated
      - path: Resources/Assets.xcassets
      - path: Resources/Fonts
        type: folder
    dependencies:
      - framework: ../rust-core/target/SufrixCore.xcframework
        embed: false
    info:
      path: Generated/Info-iOS.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Dev: allow plaintext HTTP so a self-hosted / localhost backend works.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.sufrix.pos
        PRODUCT_NAME: Sufrix POS
        TARGETED_DEVICE_FAMILY: "1,2"
    preBuildScripts:
      - name: Build iOS core (xcframework) + bindings
        basedOnDependencyAnalysis: false
        script: |
          set -e
          RUST="$SRCROOT/../rust-core"
          # Run cargo in a CLEAN env — Xcode injects SDKROOT/ICONV/etc. that break
          # the HOST cargo build (links against the app SDK → "iconv not found").
          # A clean env lets cargo resolve the right SDK per-target via xcrun.
          P="$HOME/.cargo/bin:/opt/homebrew/bin:/usr/bin:/bin:/usr/sbin:/sbin"
          env -i HOME="$HOME" PATH="$P" bash "$RUST/tool/build-bindings.sh" >/dev/null
          # Rebuild the xcframework whenever the core actually changed: build-bindings
          # rebuilds the debug dylib if ANY input changed (incl. .env → baked URL),
          # so a dylib newer than the xcframework means the static lib is stale.
          XCF="$RUST/target/SufrixCore.xcframework"
          DYLIB="$RUST/target/debug/libsufrix_core.dylib"
          if [[ ! -d "$XCF" ]] || [[ "$DYLIB" -nt "$XCF" ]]; then
            env -i HOME="$HOME" PATH="$P" bash "$RUST/tool/build-ios.sh"
          fi
