# xcodegen spec for the Sufrix POS apps (macOS + iOS). Regenerate with:
#   cd swift-app && xcodegen generate
# then open SufrixPOS.xcworkspace and pick a scheme (SufrixPOS = macOS,
# SufrixPOS-iOS = iPhone/iPad). Pre-build phases regenerate the Rust bindings
# and build the core (dylib for macOS, xcframework for iOS), so ⌘R just works.
name: SufrixPOS
options:
  bundleIdPrefix: app.sufrix
  deploymentTarget:
    macOS: "13.0"
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO

targets:
  # ── macOS app (links the cargo dylib; FFI module map via SWIFT_INCLUDE_PATHS) ──
  SufrixPOS:
    type: application
    platform: macOS
    sources:
      - path: Sources/SufrixUI
      - path: ../rust-core/bindings/swift/SufrixCoreFFI.swift
        group: Generated
      - path: Resources/Assets.xcassets
      - path: Resources/Fonts
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.sufrix.pos
        PRODUCT_NAME: Sufrix POS
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_INCLUDE_PATHS: $(SRCROOT)/Generated
        LIBRARY_SEARCH_PATHS: $(SRCROOT)/../rust-core/target/debug
        OTHER_LDFLAGS: -lsufrix_core
        LD_RUNPATH_SEARCH_PATHS: $(SRCROOT)/../rust-core/target/debug
    preBuildScripts:
      - name: Generate Rust bindings + core
        basedOnDependencyAnalysis: false
        script: |
          set -e
          # Xcode build phases run with a minimal PATH — make cargo/rustup findable.
          export PATH="$HOME/.cargo/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
          source "$HOME/.cargo/env" 2>/dev/null || true
          cd "$SRCROOT/../rust-core"
          ./tool/build-bindings.sh >/dev/null
          mkdir -p "$SRCROOT/Generated"
          cp bindings/swift/SufrixCoreFFIFFI.h "$SRCROOT/Generated/"
          cp bindings/swift/SufrixCoreFFIFFI.modulemap "$SRCROOT/Generated/module.modulemap"

  # ── iOS app (iPhone + iPad; links SufrixCore.xcframework from build-ios.sh) ──
  SufrixPOS-iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/SufrixUI
      - path: ../rust-core/bindings/swift/SufrixCoreFFI.swift
        group: Generated
      - path: Resources/Assets.xcassets
      - path: Resources/Fonts
        type: folder
    dependencies:
      - framework: ../rust-core/target/SufrixCore.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.sufrix.pos
        PRODUCT_NAME: Sufrix POS
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    preBuildScripts:
      - name: Build iOS xcframework if missing
        basedOnDependencyAnalysis: false
        script: |
          set -e
          # Xcode build phases run with a minimal PATH — make cargo/rustup findable.
          export PATH="$HOME/.cargo/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
          source "$HOME/.cargo/env" 2>/dev/null || true
          cd "$SRCROOT/../rust-core"
          ./tool/build-bindings.sh >/dev/null
          [[ -d target/SufrixCore.xcframework ]] || ./tool/build-ios.sh
