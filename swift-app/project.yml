# xcodegen spec for the Sufrix POS macOS app. Regenerate the .xcodeproj with:
#   cd swift-app && xcodegen generate
# then open SufrixPOS.xcworkspace. A pre-build phase regenerates the Rust
# bindings + builds libsufrix_core, so ⌘R just works after `xcodegen generate`.
name: SufrixPOS
options:
  bundleIdPrefix: app.sufrix
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  SufrixPOS:
    type: application
    platform: macOS
    sources:
      - path: Sources/SufrixUI
      - path: ../rust-core/bindings/swift/SufrixCoreFFI.swift
        group: Generated
      - path: Resources/Assets.xcassets
      - path: Resources/Fonts
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.sufrix.pos
        PRODUCT_NAME: Sufrix POS
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
        # The C FFI module map (regenerated into Generated/ by the pre-build step).
        SWIFT_INCLUDE_PATHS: $(SRCROOT)/Generated
        # Link the Rust core dylib from the cargo target dir.
        LIBRARY_SEARCH_PATHS: $(SRCROOT)/../rust-core/target/debug
        OTHER_LDFLAGS: -lsufrix_core
        LD_RUNPATH_SEARCH_PATHS: $(SRCROOT)/../rust-core/target/debug
    preBuildScripts:
      - name: Generate Rust bindings + core
        basedOnDependencyAnalysis: false
        script: |
          set -e
          cd "$SRCROOT/../rust-core"
          ./tool/build-bindings.sh >/dev/null
          mkdir -p "$SRCROOT/Generated"
          cp bindings/swift/SufrixCoreFFIFFI.h "$SRCROOT/Generated/"
          cp bindings/swift/SufrixCoreFFIFFI.modulemap "$SRCROOT/Generated/module.modulemap"
