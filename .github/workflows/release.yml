name: Release

# Multi-platform build for Madar POS (Kotlin Multiplatform + SwiftUI + Rust core).
# Modeled on the legacy Flutter app's Release workflow.
#
# Each build job publishes its artifact DIRECTLY to the public releases-only repo
# (Shawket4/madar-pos-releases) — no workflow artifacts (avoids the Actions artifact
# storage quota). Source stays private; only built binaries are published.
#
# Requires repo secret RELEASES_TOKEN (PAT with Contents: write on madar-pos-releases).
# Release on a version tag; workflow_dispatch runs the builds without publishing.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  NDK_VERSION: "26.3.11579264"

jobs:
  # ── Android APK (the primary target — POS tablets) ───────────────────────────
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust (Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-core

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;${NDK_VERSION}"

      - name: Regenerate typed API client
        run: SKIP_EXPORT=1 MADAR_BACKEND_DIR="$PWD" bash rust-core/tool/generate_api.sh

      - name: Build native libs + Kotlin bindings
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
        run: bash rust-core/tool/build-android.sh

      - name: Generate debug keystore (release is debug-signed for testing)
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" || true

      - name: Build APK
        working-directory: kotlin-app
        run: ./gradlew :composeApp:assembleRelease --no-daemon

      - name: Publish APK → madar-pos-releases
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          # Idempotent create (|| true swallows the concurrent-job race), then upload.
          gh release create "${{ github.ref_name }}" --repo Shawket4/madar-pos-releases \
            --title "Madar POS ${{ github.ref_name }}" \
            --notes "Automated multi-platform build of Madar POS — built from private madar-pos @ ${{ github.sha }}." \
            2>/dev/null || true
          gh release upload "${{ github.ref_name }}" \
            kotlin-app/composeApp/build/outputs/apk/release/*.apk \
            --repo Shawket4/madar-pos-releases --clobber

  # ── Desktop (Linux + macOS) — best-effort ────────────────────────────────────
  desktop:
    name: Build Desktop (${{ matrix.os }})
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-core

      - name: Regenerate typed API client
        run: SKIP_EXPORT=1 MADAR_BACKEND_DIR="$PWD" bash rust-core/tool/generate_api.sh

      - name: Build host native lib + bindings
        run: bash rust-core/tool/build-bindings.sh

      - name: Package desktop distribution
        working-directory: kotlin-app
        run: ./gradlew :composeApp:packageReleaseDistributionForCurrentOS --no-daemon

      - name: Publish desktop → madar-pos-releases
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" --repo Shawket4/madar-pos-releases \
            --title "Madar POS ${{ github.ref_name }}" \
            --notes "Automated multi-platform build of Madar POS — built from private madar-pos @ ${{ github.sha }}." \
            2>/dev/null || true
          shopt -s nullglob globstar
          files=(kotlin-app/composeApp/build/compose/binaries/main-release/**/*.deb \
                 kotlin-app/composeApp/build/compose/binaries/main-release/**/*.dmg \
                 kotlin-app/composeApp/build/compose/binaries/main-release/**/*.msi)
          if [ ${#files[@]} -gt 0 ]; then
            gh release upload "${{ github.ref_name }}" "${files[@]}" \
              --repo Shawket4/madar-pos-releases --clobber
          else
            echo "no desktop artifacts to upload"
          fi

  # ── iOS (build check; unsigned) — best-effort ────────────────────────────────
  ios:
    name: Build iOS (unsigned)
    continue-on-error: true
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust (iOS targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-core

      - name: Regenerate typed API client
        run: SKIP_EXPORT=1 MADAR_BACKEND_DIR="$PWD" bash rust-core/tool/generate_api.sh

      - name: Build Rust xcframework + Swift bindings
        run: bash rust-core/tool/build-ios.sh

      - name: Build app (simulator, no code signing)
        working-directory: swift-app
        run: |
          xcodebuild -project MadarPOS.xcodeproj -scheme MadarPOS \
            -sdk iphonesimulator -configuration Release \
            CODE_SIGNING_ALLOWED=NO build
